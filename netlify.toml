[[redirects]]
  from = "/*"
  to = "/.netlify/functions/mcp_server/:splat"
  status = 200

[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["*.py", "token_storage.py", "auth_manager.py", "basecamp_client.py", "search_utils.py", "basecamp_fastmcp.py"]
